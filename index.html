<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gestor de Multas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
  <div class="container mt-5">
    <h1 class="mb-4 text-center">🚗 Gestor de Multas</h1>

    <div class="row">
      <div class="col-md-6">
        <h4>Multas por Veículo</h4>
        <form id="searchForm">
          <input type="text" class="form-control mb-2" placeholder="Digite a placa..." id="placaInput">
          <button type="submit" class="btn btn-primary w-100">Buscar</button>
        </form>
        <div id="resultado" class="mt-3"></div>
      </div>

      <div class="col-md-6">
        <h4>Estatísticas</h4>
        <ul class="list-group" id="estatisticas">
          <li class="list-group-item">Total de multas: <span id="totalMultas">--</span></li>
          <li class="list-group-item">Pendentes: <span id="pendentes">--</span></li>
          <li class="list-group-item">Pagas: <span id="pagas">--</span></li>
          <li class="list-group-item">Recorrendo: <span id="recorrendo">--</span></li>
        </ul>
      </div>
    </div>
  </div>

  <script src="static/js/script.js"></script>
</body>
</html>
